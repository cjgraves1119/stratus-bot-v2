name: Deploy Stratus Bots

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-bots
  cancel-in-progress: false

jobs:
  deploy-webex:
    name: Deploy Webex Bot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (Webex)
        run: cd worker && npm install --omit=dev

      - name: Deploy to Cloudflare (Webex)
        run: cd worker && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify Webex deployment
        run: |
          echo "✓ Webex bot deployed to https://stratus-ai-bot.chrisg-ec1.workers.dev"

  deploy-gchat:
    name: Deploy Google Chat Bot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (Google Chat)
        run: cd worker-gchat && npm install --omit=dev

      - name: Deploy to Cloudflare (Google Chat)
        run: cd worker-gchat && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify Google Chat deployment
        run: |
          echo "✓ Google Chat bot deployed to https://stratus-ai-bot-gchat.chrisg-ec1.workers.dev"

  deploy-gateway:
    name: Deploy Gateway Worker (Gemma-first waterfall)
    runs-on: ubuntu-latest
    needs: [deploy-gchat]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (Gateway)
        run: cd worker-gateway && (npm install --omit=dev || npm install --omit=dev --no-package-lock)

      - name: Deploy to Cloudflare (Gateway)
        run: cd worker-gateway && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify Gateway deployment
        run: |
          echo "✓ Gateway worker deployed to https://stratus-ai-bot-gateway.chrisg-ec1.workers.dev"

  post-deploy:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [deploy-webex, deploy-gchat, deploy-gateway]
    steps:
      - uses: actions/checkout@v4

      - name: Verify all workers are live
        run: |
          echo "✓ All Stratus workers deployed successfully"
          echo "  Webex:       https://stratus-ai-bot.chrisg-ec1.workers.dev"
          echo "  Google Chat: https://stratus-ai-bot-gchat.chrisg-ec1.workers.dev"
          echo "  Gateway:     https://stratus-ai-bot-gateway.chrisg-ec1.workers.dev (Gemma-first waterfall)"
