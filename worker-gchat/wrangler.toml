name = "stratus-ai-bot-gchat"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Workers Paid plan ($5/month): no wall-clock limit on ctx.waitUntil().
# Free plan caps at ~30s which isn't enough for multi-step CRM agentic loops.
# usage_model = "unbound" is deprecated and ignored by modern Wrangler.

[vars]
# Non-secret config (secrets set via `wrangler secret put`)
# ANTHROPIC_API_KEY = set via wrangler secret
# GOOGLE_PROJECT_NUMBER = set via wrangler secret (for JWT verification)
#
# ─── CRM & Email Agent Secrets (POC) ───
# Set these via: wrangler secret put <NAME>
#
# Zoho CRM OAuth (create Self Client at api-console.zoho.com)
# ZOHO_CLIENT_ID = Zoho self-client ID
# ZOHO_CLIENT_SECRET = Zoho self-client secret
# ZOHO_REFRESH_TOKEN = Zoho offline refresh token (scope: ZohoCRM.modules.ALL,ZohoCRM.settings.fields.ALL,ZohoCRM.coql.READ)
#
# Gmail API OAuth (uses existing GCP project swift-catfish-474413-d5)
# GOOGLE_CLIENT_ID = GCP OAuth client ID
# GOOGLE_CLIENT_SECRET = GCP OAuth client secret
# GOOGLE_REFRESH_TOKEN = Gmail offline refresh token (scope: gmail.readonly,gmail.compose,gmail.send)
#
# Google Chat Async Response (service account for Chat API)
# GCP_SERVICE_ACCOUNT_KEY = Full JSON key from GCP service account (scope: chat.bot)
#   Create at: https://console.cloud.google.com/iam-admin/serviceaccounts?project=swift-catfish-474413-d5
#   Required for CRM/email queries that exceed Google Chat's 30-second sync timeout

[[kv_namespaces]]
binding = "CONVERSATION_KV"
id = "af24db17eaa644fe9456e2ae74379766"

# Shared pricing KV — daily cron writes prices_live here, both workers read from it
[[kv_namespaces]]
binding = "PRICES_KV"
id = "af24db17eaa644fe9456e2ae74379766"

# Service binding to self: Workers can't fetch their own URL directly
# (same-zone restriction). This binding lets us self-invoke /_work and
# /_continue endpoints for long-running CRM agentic loops.
[[services]]
binding = "SELF"
service = "stratus-ai-bot-gchat"

# ── Cloudflare Queue: CRM work dispatch ─────────────────────────────
# Webhook handler produces a message → queue consumer processes it in
# a completely independent execution context (15-min wall-clock limit).
# This bypasses the 30s ctx.waitUntil wall-clock limit that kills
# multi-step agentic CRM loops (2-3 Anthropic calls @ 8-12s each).
[[queues.producers]]
queue = "stratus-gchat-crm-queue"
binding = "CRM_QUEUE"

[[queues.consumers]]
queue = "stratus-gchat-crm-queue"
max_batch_size = 1
max_retries = 0

# Daily price refresh from Zoho WooProducts → KV
# Runs at 11:00 UTC (6:00 AM CT / 5:00 AM CST)
[triggers]
crons = ["0 11 * * *"]
